{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>{{ post.title }} - 리뷰 상세보기</title>
        <link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}" />
        <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    </head>
    <body class="d-flex flex-column h-100 bg-light">
        <main class="flex-shrink-0">
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3">
                <div class="container px-5">
                    <a class="navbar-brand" href="{% url 'posts' %}"><span class="fw-bolder text-primary">My Book Review</span></a>
                    <div class="collapse navbar-collapse">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
                            <li class="nav-item"><a class="nav-link" href="{% url 'posts' %}">Home</a></li>
                        </ul>
                    </div>
                </div>
            </nav>

            <article class="py-5">
                <div class="container px-5">
                    <div class="row justify-content-center">
                        <div class="col-lg-8">
                            <header class="mb-4">
                                <h1 class="fw-bolder mb-1">{{ post.title }}</h1>
                                <div class="text-muted fst-italic mb-2">{{ post.created_at|date:"Y년 m월 d일 H:i" }} 작성</div>
                            </header>
                            <hr />
                            <section class="mb-5 fs-5" style="white-space: pre-wrap;">
                                {{ post.content }}
                            </section>
                            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                                <a class="btn btn-outline-dark btn-lg px-5 py-3 fs-6 fw-bolder" href="{% url 'posts' %}">목록으로 돌아가기</a>
                            </div>
                        </div>
                    </div>
                </div>
            </article>
        </main>
    </body>
</html>
